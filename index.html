<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Spots - An interactive social media web application for sharing and liking photos">
  <meta name="author" content="Syed Hasan">
  <meta name="keywords" content="social media, photos, sharing, interactive, web application">
  <title>Spots</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="pages/index.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <p class="header__logo-container">
        <img src="images/Logo.svg" alt="Spots logo" class="header__logo">
      </p>
    </header>
    <main class="content">
      <section class="profile">
        <img src="images/avatar.png" alt="Syed Hasan profile picture" class="profile__avatar">
        <div class="profile__info">
          <h1 class="profile__name">Syed Hasan</h1>
          <p class="profile__description">Author Of Black Prescription and aspiring Software engineer, maybe . Lacks any talent though. Stil hasn't published volume 1</p>
          <button class="profile__edit-button" type="button">
            <img src="images/editicon.svg" alt="edit profile" class="editProfileButton">
          </button>
        </div>
        <button class="profile__add-button" type="button">
          <img src="images/ButtonLarge.png">New post
        </button>
      </section>
      <section class="cards">
        <ul class="cards__list"></ul>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__copyright">© 2026 Spots</p>
    </footer>
  </div>

  <template id="card-template">
    <li class="card">
      <button class="card__delete-button" type="button" aria-label="Delete"></button>
      <img class="card__image">
      <div class="card__description">
        <h2 class="card__title"></h2>
        <button class="card__like-button" type="button" aria-label="Like"></button>
      </div>
    </li>
  </template>

  <div class="modal" id="edit-profile-modal">
    <div class="modal__container">
      <button class="modal__close-button" type="button" aria-label="Close"></button>
      <h2 class="modal__title">Edit profile</h2>
      <form class="modal__form" name="edit-profile-form">
        <label class="modal__label">Name
          <input type="text" name="name" class="modal__input" placeholder="Type your name" minlength="2" maxlength="40">
        </label>
        <label class="modal__label">description
          <input type="text" name="description" class="modal__input" placeholder="Description" minlength="2" maxlength="200">
        </label>
        <button type="submit" class="modal__submit-button">Save</button>
      </form>
    </div>
  </div>

  <div class="modal" id="new-post-modal">
    <div class="modal__container">
      <button class="modal__close-button" type="button" aria-label="Close"></button>
      <h2 class="modal__title">New post</h2>
      <form class="modal__form" name="new-post-form">
        <label class="modal__label">Image link
          <input type="url" name="link" class="modal__input" placeholder="Paste an Image link">
        </label>
        <label class="modal__label">caption
          <input type="text" name="caption" class="modal__input" placeholder="Type a Caption for the picture">
        </label>
        <button type="submit" class="modal__submit-button">Save</button>
      </form>
    </div>
  </div>

  <div class="modal" id="preview-modal">
    <div class="modal__container modal__container_type_image">
      <button class="modal__close-button" type="button" aria-label="Close"></button>
      <img class="modal__image" src="" alt="">
      <p class="modal__caption"></p>
    </div>
  </div>

  <script src="scripts/index.js"></script>
</body>
</html>
